<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEDGER</title>
<style>
/* ── Reset & Theme ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0d1520;--border:#1e2d42;--text:#e2e8f0;--dim:#7a8ba3;
  --cyan:#00E5FF;--amber:#F59E0B;--violet:#8B5CF6;--emerald:#34d399;--rose:#fb7185;
  --crimson:#E11D48;--slate:#64748B;--cliff-red:#DC2626;--hazard:#FAFF00;
  --grid:#1E293B;--reservoir-top:#0F172A;--reservoir-bot:#1E3A8A;
  --scanline:rgba(255,255,255,0.015);
  --glow-cyan:rgba(0,229,255,0.5);--glow-crimson:rgba(225,29,72,0.4);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cascadia Code','Fira Code','JetBrains Mono',monospace;font-size:15px;overflow:hidden}
body{background-image:
  linear-gradient(var(--scanline) 1px, transparent 1px),
  linear-gradient(90deg, var(--scanline) 1px, transparent 1px);
  background-size:100% 3px, 50px 100%}

/* ── Layout ─────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;padding:16px;gap:12px}
header{display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:18px;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 12px var(--glow-cyan),0 0 30px rgba(0,229,255,0.2);animation:titlePulse 4s ease-in-out infinite}
@keyframes titlePulse{0%,100%{text-shadow:0 0 12px var(--glow-cyan),0 0 30px rgba(0,229,255,0.15)}50%{text-shadow:0 0 16px var(--glow-cyan),0 0 40px rgba(0,229,255,0.3)}}
#summary-display{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ── Scenario Buttons ──────────────────────────────────────── */
#scenario-bar{display:flex;gap:8px;flex-shrink:0;align-items:center}
#scenario-bar label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:2px}
.scenario-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 14px;color:var(--dim);font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.scenario-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.scenario-btn.active{background:rgba(0,229,255,0.1);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,0.2)}
#corridor-toggle{margin-left:12px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);cursor:pointer;user-select:none}
#corridor-toggle input{accent-color:var(--cyan)}

/* ── Main Canvas Area ──────────────────────────────────────── */
#canvas-wrap{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:inset 0 0 60px rgba(0,0,0,0.4)}
#main-svg{display:block;width:100%;height:100%}

/* ── Runway HUD ────────────────────────────────────────────── */
#runway-hud{position:absolute;top:12px;right:12px;background:rgba(8,12,20,0.92);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:10px;line-height:1.7;pointer-events:none;z-index:20;backdrop-filter:blur(4px);width:180px}
#runway-hud .hud-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
#runway-hud .hud-row{display:flex;justify-content:space-between;margin-bottom:1px}
#runway-hud .hud-label{color:var(--dim)}
#runway-hud .hud-value{color:var(--text);font-weight:600;text-align:right}
#runway-hud .hud-value.cobalt{color:#3B82F6}
#runway-hud .hud-value.blue{color:#60A5FA}
#runway-hud .hud-value.amber-val{color:var(--amber)}
#runway-hud .hud-value.crimson-val{color:var(--crimson)}
#runway-hud .hud-value.hazard-val{color:var(--hazard);animation:hazardPulse 0.8s ease-in-out infinite}
@keyframes hazardPulse{0%,100%{opacity:1}50%{opacity:0.4}}
#runway-bar{margin-top:8px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
#runway-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease,background 0.6s ease}

/* ── Playhead ──────────────────────────────────────────────── */
#playhead-info{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(8,12,20,0.92);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:11px;color:var(--dim);pointer-events:none;z-index:10;white-space:nowrap;backdrop-filter:blur(4px);opacity:0;transition:opacity 0.2s}
#playhead-info.visible{opacity:1}

/* ── Tooltip ───────────────────────────────────────────────── */
#tooltip{position:absolute;background:rgba(8,12,20,0.95);border:1px solid var(--cyan);border-radius:6px;padding:10px 14px;font-size:11px;color:var(--text);pointer-events:none;z-index:20;white-space:nowrap;backdrop-filter:blur(4px);opacity:0;transition:opacity 0.15s;max-width:300px}
#tooltip.visible{opacity:1}
#tooltip .tt-name{color:var(--cyan);font-weight:600;margin-bottom:4px}
#tooltip .tt-amount{font-size:13px;margin-bottom:2px}
#tooltip .tt-pct{color:var(--dim);font-size:10px}

/* ── OPEX Detail Panel ─────────────────────────────────────── */
#opex-detail{position:absolute;bottom:16px;right:16px;background:rgba(8,12,20,0.92);border:1px solid var(--crimson);border-radius:8px;padding:14px 18px;font-size:11px;line-height:1.8;min-width:220px;z-index:10;backdrop-filter:blur(4px);display:none}
#opex-detail.visible{display:block}
#opex-detail .od-title{color:var(--crimson);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
#opex-detail .od-row{display:flex;justify-content:space-between;gap:12px}
#opex-detail .od-name{color:var(--dim)}
#opex-detail .od-val{color:var(--text)}
#opex-detail .od-close{position:absolute;top:8px;right:10px;color:var(--dim);cursor:pointer;font-size:14px}
#opex-detail .od-close:hover{color:var(--crimson)}

/* ── Loading State ─────────────────────────────────────────── */
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50}
#loading span{color:var(--cyan);font-size:14px;letter-spacing:3px;animation:loadBlink 1.2s ease-in-out infinite}
@keyframes loadBlink{0%,100%{opacity:0.3}50%{opacity:1}}
#loading.hidden{display:none}

/* ── Legend ─────────────────────────────────────────────────── */
#legend{position:absolute;top:16px;left:16px;display:flex;flex-direction:column;gap:4px;font-size:10px;color:var(--dim);z-index:10;pointer-events:none}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>LEDGER</h1>
    <div id="summary-display">Awaiting data...</div>
  </header>
  <div id="scenario-bar">
    <label>Scenario:</label>
    <div id="scenario-buttons"></div>
    <label id="corridor-toggle"><input type="checkbox" id="corridor-cb"> Probability Corridor</label>
  </div>
  <div style="position:relative;flex:1;min-height:300px">
    <div id="canvas-wrap">
      <div id="loading"><span>INITIALIZING LEDGER...</span></div>
      <svg id="main-svg"></svg>
      <div id="legend"></div>
      <div id="playhead-info"></div>
      <div id="tooltip"></div>
      <div id="opex-detail"></div>
    </div>
    <div id="runway-hud"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   LEDGER — Kinetic Financial Visualizer
   Self-contained. No dependencies. All SVG, no D3.
   ══════════════════════════════════════════════════════════════ */

(function() {
'use strict';

/* ── Constants ─────────────────────────────────────────────── */
const COLORS = {
  cyan: '#00E5FF', cyanGlow: 'rgba(0,229,255,0.3)',
  amber: '#F59E0B', amberGlow: 'rgba(245,158,11,0.3)',
  violet: '#8B5CF6', violetGlow: 'rgba(139,92,246,0.3)',
  crimson: '#E11D48', crimsonGlow: 'rgba(225,29,72,0.3)',
  slate: '#64748B', slateGlow: 'rgba(100,116,139,0.3)',
  cliff: '#DC2626', hazard: '#FAFF00',
  reservoirTop: '#0F172A', reservoirBot: '#1E3A8A',
  grid: '#1E293B', equator: '#ffffff', bg: '#080c14',
  text: '#e2e8f0', dim: '#7a8ba3', surface: '#0d1520',
  cobalt: '#3B82F6', blue: '#60A5FA',
  corridor: 'rgba(0,229,255,0.06)', corridorStroke: 'rgba(0,229,255,0.15)'
};

const PADDING = { top: 72, right: 210, bottom: 60, left: 80 };
const POLL_INTERVAL = 500;
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* ── State ─────────────────────────────────────────────────── */
let lastDataHash = '';
let currentData = null;
let activeScenario = 'base';
let showCorridor = false;
let cashFlows = {};
let animationTargets = {};
let animationCurrent = {};
let animating = false;
let playheadMonth = -1;
let isDraggingPlayhead = false;
let opexExpanded = false;
let svgRect = null;
let maxSingleFlow = 0;

/* ── DOM Refs ──────────────────────────────────────────────── */
const svg = document.getElementById('main-svg');
const canvasWrap = document.getElementById('canvas-wrap');
const summaryEl = document.getElementById('summary-display');
const scenarioButtons = document.getElementById('scenario-buttons');
const corridorCb = document.getElementById('corridor-cb');
const loadingEl = document.getElementById('loading');
const hudEl = document.getElementById('runway-hud');
const legendEl = document.getElementById('legend');
const playheadInfoEl = document.getElementById('playhead-info');
const tooltipEl = document.getElementById('tooltip');
const opexDetailEl = document.getElementById('opex-detail');

/* ── SVG Namespace ─────────────────────────────────────────── */
const NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

/* ══════════════════════════════════════════════════════════════
   FINANCIAL ENGINE
   ══════════════════════════════════════════════════════════════ */

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function applyScenarioAdjustments(financials, scenario) {
  const fin = deepClone(financials);
  if (!scenario || !scenario.adjustments) return fin;

  for (const adj of scenario.adjustments) {
    let target = null;
    const pools = [fin.revenue_streams, fin.operating_expenses, fin.cost_of_goods, fin.capital_expenditure];
    for (const pool of pools) {
      if (!pool) continue;
      const found = pool.find(item => item.id === adj.targetId);
      if (found) { target = found; break; }
    }
    if (!target) continue;

    if (!target._adjustments) target._adjustments = [];
    target._adjustments.push(adj);
  }
  return fin;
}

function getAdjustedValue(item, field, month, baseValue) {
  if (!item._adjustments) return baseValue;
  let value = baseValue;
  for (const adj of item._adjustments) {
    if (adj.field !== field) continue;
    if (adj.startMonth && month < adj.startMonth) continue;
    if (adj.endMonth && month > adj.endMonth) continue;

    switch (adj.operation) {
      case 'multiply': value *= adj.value; break;
      case 'add': value += adj.value; break;
      case 'set': value = adj.value; break;
    }
  }
  return value;
}

function computeRevenueForMonth(stream, month) {
  const startMonth = stream.startMonth || 1;
  const endMonth = getAdjustedValue(stream, 'endMonth', month, stream.endMonth || Infinity);
  if (month < startMonth || month > endMonth) return 0;

  const monthsActive = month - startMonth;
  let baseAmount = getAdjustedValue(stream, 'amount', month, stream.amount);
  const growthRate = getAdjustedValue(stream, 'growthRate', month, stream.growthRate || 0);
  const churnRate = getAdjustedValue(stream, 'churnRate', month, stream.churnRate || 0);

  if (stream.frequency === 'quarterly' && ((month - startMonth) % 3 !== 0)) return 0;
  if (stream.frequency === 'annual' && ((month - startMonth) % 12 !== 0)) return 0;

  if (stream.growthType === 'compound' && growthRate > 0) {
    baseAmount *= Math.pow(1 + growthRate, monthsActive);
  } else if (stream.growthType === 'linear' && growthRate > 0) {
    baseAmount *= (1 + growthRate * monthsActive);
  }

  if (churnRate > 0) {
    baseAmount *= Math.pow(1 - churnRate, monthsActive);
  }

  return baseAmount;
}

function getPaymentDelay(terms) {
  if (!terms || terms === 'prepaid' || terms === 'immediate') return 0;
  const match = terms.match(/net-(\d+)/);
  if (match) return Math.ceil(parseInt(match[1]) / 30);
  return 0;
}

function computeCashFlow(data, scenario) {
  const fin = applyScenarioAdjustments(data.financials, scenario);
  const months = data.timeline.months || 24;
  let cash = fin.starting_cash || 0;
  const result = [];

  const deferredRevenue = {};

  for (let m = 1; m <= months; m++) {
    let grossRevenue = 0;
    let cashInflow = 0;
    let cogsTotal = 0;
    let opexTotal = 0;
    let taxTotal = 0;
    let capexTotal = 0;
    const revenueDetail = [];
    const cogsDetail = [];
    const opexDetail = [];
    const capexDetail = [];

    for (const stream of (fin.revenue_streams || [])) {
      const rev = computeRevenueForMonth(stream, m);
      if (rev > 0) {
        grossRevenue += rev;
        revenueDetail.push({ id: stream.id, name: stream.name, amount: rev, terms: stream.paymentTerms });
        const delay = getPaymentDelay(stream.paymentTerms);
        const receiveMonth = m + delay;
        if (delay === 0) {
          cashInflow += rev;
        } else {
          if (!deferredRevenue[receiveMonth]) deferredRevenue[receiveMonth] = 0;
          deferredRevenue[receiveMonth] += rev;
        }
      }
    }

    if (deferredRevenue[m]) {
      cashInflow += deferredRevenue[m];
      delete deferredRevenue[m];
    }

    const monthGrossRevForCogs = grossRevenue;
    for (const cog of (fin.cost_of_goods || [])) {
      let cogAmount = 0;
      if (cog.type === 'percentage') {
        if (cog.appliesTo === 'all_revenue') {
          cogAmount = monthGrossRevForCogs * cog.value;
        } else {
          const targetStream = (fin.revenue_streams || []).find(s => s.id === cog.appliesTo);
          if (targetStream) {
            const targetRev = computeRevenueForMonth(targetStream, m);
            cogAmount = targetRev * cog.value;
          }
        }
      } else if (cog.type === 'fixed') {
        cogAmount = cog.value || cog.amount || 0;
      }
      if (cogAmount > 0) {
        cogsTotal += cogAmount;
        cogsDetail.push({ id: cog.id, name: cog.name, amount: cogAmount });
      }
    }

    for (const opex of (fin.operating_expenses || [])) {
      let opexAmount = opex.amount || 0;
      const growthRate = opex.growthRate || 0;
      if (growthRate > 0) {
        opexAmount *= Math.pow(1 + growthRate, m - 1);
      }

      if (opex.frequency === 'annual') {
        if (opex.paymentMonth && m !== opex.paymentMonth) continue;
        if (!opex.paymentMonth && m !== 1) continue;
      } else if (opex.frequency === 'quarterly') {
        if ((m - 1) % 3 !== 0) continue;
      }

      opexTotal += opexAmount;
      opexDetail.push({ id: opex.id, name: opex.name, amount: opexAmount, category: opex.category });
    }

    if (fin.taxes && fin.taxes.effectiveRate > 0) {
      if (fin.taxes.frequency === 'quarterly' && m % 3 === 0) {
        const profit = grossRevenue * 3 - (cogsTotal + opexTotal) * 3;
        if (profit > 0) {
          taxTotal = profit * fin.taxes.effectiveRate;
        }
      } else if (fin.taxes.frequency === 'annual' && m === 12) {
        const profit = grossRevenue * 12 - (cogsTotal + opexTotal) * 12;
        if (profit > 0) {
          taxTotal = profit * fin.taxes.effectiveRate;
        }
      } else if (fin.taxes.frequency === 'monthly') {
        const profit = grossRevenue - cogsTotal - opexTotal;
        if (profit > 0) {
          taxTotal = profit * fin.taxes.effectiveRate;
        }
      }
    }

    for (const cap of (fin.capital_expenditure || [])) {
      if (cap.month === m) {
        capexTotal += cap.amount;
        capexDetail.push({ id: cap.id, name: cap.name, amount: cap.amount });
      }
    }

    const totalOutflow = cogsTotal + opexTotal + taxTotal + capexTotal;
    const netCashFlow = cashInflow - totalOutflow;
    cash += netCashFlow;

    result.push({
      month: m,
      cash: cash,
      grossRevenue: grossRevenue,
      cashInflow: cashInflow,
      cogsTotal: cogsTotal,
      opexTotal: opexTotal,
      taxTotal: taxTotal,
      capexTotal: capexTotal,
      totalOutflow: totalOutflow,
      netCashFlow: netCashFlow,
      revenueDetail: revenueDetail,
      cogsDetail: cogsDetail,
      opexDetail: opexDetail,
      capexDetail: capexDetail
    });
  }

  return result;
}

function computeAllScenarios(data) {
  const flows = {};
  for (const scenario of (data.scenarios || [])) {
    flows[scenario.id] = computeCashFlow(data, scenario);
  }
  if (!flows['base'] && data.scenarios && data.scenarios.length > 0) {
    flows[data.scenarios[0].id] = computeCashFlow(data, data.scenarios[0]);
  }
  if (Object.keys(flows).length === 0) {
    flows['base'] = computeCashFlow(data, { id: 'base', name: 'Base', adjustments: [] });
  }
  return flows;
}

function findRunway(flow) {
  for (let i = 0; i < flow.length; i++) {
    if (flow[i].cash <= 0) return i;
  }
  return flow.length;
}

function findBurnRate(flow) {
  let totalBurn = 0;
  let burnMonths = 0;
  for (const m of flow) {
    if (m.netCashFlow < 0) {
      totalBurn += Math.abs(m.netCashFlow);
      burnMonths++;
    }
  }
  return burnMonths > 0 ? totalBurn / burnMonths : 0;
}

/* ══════════════════════════════════════════════════════════════
   RENDERING ENGINE
   ══════════════════════════════════════════════════════════════ */

function formatCurrency(amount, currency) {
  const sym = currency === 'GBP' ? '\u00a3' : currency === 'EUR' ? '\u20ac' : '$';
  if (Math.abs(amount) >= 1000000) return sym + (amount / 1000000).toFixed(1) + 'M';
  if (Math.abs(amount) >= 1000) return sym + (amount / 1000).toFixed(0) + 'K';
  return sym + Math.round(amount).toLocaleString();
}

function formatCurrencyFull(amount, currency) {
  const sym = currency === 'GBP' ? '\u00a3' : currency === 'EUR' ? '\u20ac' : '$';
  return sym + Math.round(amount).toLocaleString();
}

function getMonthLabel(monthIndex, startDate) {
  if (!startDate) return 'M' + monthIndex;
  const d = new Date(startDate);
  d.setMonth(d.getMonth() + monthIndex - 1);
  return MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear().toString().slice(2);
}

function clearSVG() {
  while (svg.firstChild) svg.removeChild(svg.firstChild);
}

function getChartDimensions() {
  const rect = canvasWrap.getBoundingClientRect();
  return {
    width: rect.width,
    height: rect.height,
    plotLeft: PADDING.left,
    plotRight: rect.width - PADDING.right,
    plotTop: PADDING.top,
    plotBottom: rect.height - PADDING.bottom,
    plotWidth: rect.width - PADDING.left - PADDING.right,
    plotHeight: rect.height - PADDING.top - PADDING.bottom
  };
}

function buildDefs(dim) {
  const defs = svgEl('defs');

  const reservoirGrad = svgEl('linearGradient', { id: 'grad-reservoir', x1: '0', y1: '0', x2: '0', y2: '1' });
  const stop1 = svgEl('stop', { offset: '0%', 'stop-color': COLORS.reservoirTop, 'stop-opacity': '0.9' });
  const stop2 = svgEl('stop', { offset: '100%', 'stop-color': COLORS.reservoirBot, 'stop-opacity': '0.95' });
  reservoirGrad.appendChild(stop1);
  reservoirGrad.appendChild(stop2);
  defs.appendChild(reservoirGrad);

  const furnaceGrad = svgEl('linearGradient', { id: 'grad-furnace', x1: '0', y1: '0', x2: '0', y2: '1' });
  const fs1 = svgEl('stop', { offset: '0%', 'stop-color': COLORS.crimson, 'stop-opacity': '0.7' });
  const fs2 = svgEl('stop', { offset: '100%', 'stop-color': COLORS.crimson, 'stop-opacity': '0.15' });
  furnaceGrad.appendChild(fs1);
  furnaceGrad.appendChild(fs2);
  defs.appendChild(furnaceGrad);

  const hatch = svgEl('pattern', { id: 'hatch-cyan', patternUnits: 'userSpaceOnUse', width: '8', height: '8', patternTransform: 'rotate(45)' });
  const hatchLine = svgEl('line', { x1: '0', y1: '0', x2: '0', y2: '8', stroke: COLORS.cyan, 'stroke-width': '1.5', 'stroke-opacity': '0.3' });
  hatch.appendChild(hatchLine);
  defs.appendChild(hatch);

  const corridorGrad = svgEl('linearGradient', { id: 'grad-corridor', x1: '0', y1: '0', x2: '0', y2: '1' });
  const cs1 = svgEl('stop', { offset: '0%', 'stop-color': COLORS.cyan, 'stop-opacity': '0.08' });
  const cs2 = svgEl('stop', { offset: '50%', 'stop-color': COLORS.cyan, 'stop-opacity': '0.03' });
  const cs3 = svgEl('stop', { offset: '100%', 'stop-color': COLORS.cyan, 'stop-opacity': '0.08' });
  corridorGrad.appendChild(cs1);
  corridorGrad.appendChild(cs2);
  corridorGrad.appendChild(cs3);
  defs.appendChild(corridorGrad);

  const cliffGrad = svgEl('linearGradient', { id: 'grad-cliff', x1: '0', y1: '0', x2: '1', y2: '0' });
  const clf1 = svgEl('stop', { offset: '0%', 'stop-color': '#000000', 'stop-opacity': '0' });
  const clf2 = svgEl('stop', { offset: '100%', 'stop-color': '#000000', 'stop-opacity': '0.85' });
  cliffGrad.appendChild(clf1);
  cliffGrad.appendChild(clf2);
  defs.appendChild(cliffGrad);

  const glowFilter = svgEl('filter', { id: 'glow-cyan', x: '-50%', y: '-50%', width: '200%', height: '200%' });
  const gb = svgEl('feGaussianBlur', { stdDeviation: '3', result: 'blur' });
  const merge = svgEl('feMerge');
  const mn1 = svgEl('feMergeNode', { in: 'blur' });
  const mn2 = svgEl('feMergeNode', { in: 'SourceGraphic' });
  merge.appendChild(mn1);
  merge.appendChild(mn2);
  glowFilter.appendChild(gb);
  glowFilter.appendChild(merge);
  defs.appendChild(glowFilter);

  return defs;
}

function drawGrid(group, dim, maxVal, minVal) {
  const steps = 6;
  const range = maxVal - minVal;

  for (let i = 0; i <= steps; i++) {
    const val = minVal + (range * i / steps);
    const y = dim.plotBottom - ((val - minVal) / range) * dim.plotHeight;

    const line = svgEl('line', {
      x1: dim.plotLeft, y1: y, x2: dim.plotRight, y2: y,
      stroke: COLORS.grid, 'stroke-width': '0.5', 'stroke-opacity': '0.6'
    });
    group.appendChild(line);

    const label = svgEl('text', {
      x: dim.plotLeft - 8, y: y + 3,
      fill: COLORS.dim, 'font-size': '10', 'font-family': 'inherit', 'text-anchor': 'end'
    });
    label.textContent = formatCurrency(val, currentData.financials.currency || 'USD');
    group.appendChild(label);
  }

  const flow = cashFlows[activeScenario] || [];
  for (let i = 0; i < flow.length; i++) {
    const x = dim.plotLeft + (i / Math.max(flow.length - 1, 1)) * dim.plotWidth;

    const line = svgEl('line', {
      x1: x, y1: dim.plotTop, x2: x, y2: dim.plotBottom,
      stroke: COLORS.grid, 'stroke-width': '0.5', 'stroke-opacity': '0.3'
    });
    group.appendChild(line);

    if (i % Math.max(1, Math.floor(flow.length / 12)) === 0 || i === flow.length - 1) {
      const label = svgEl('text', {
        x: x, y: dim.plotBottom + 18,
        fill: COLORS.dim, 'font-size': '10', 'font-family': 'inherit', 'text-anchor': 'middle'
      });
      label.textContent = getMonthLabel(flow[i].month, currentData.timeline.startDate);
      group.appendChild(label);
    }
  }
}

function drawEquator(group, dim, minVal, maxVal) {
  const range = maxVal - minVal;
  const equatorY = dim.plotBottom - ((0 - minVal) / range) * dim.plotHeight;

  if (equatorY >= dim.plotTop && equatorY <= dim.plotBottom) {
    const line = svgEl('line', {
      x1: dim.plotLeft, y1: equatorY, x2: dim.plotRight, y2: equatorY,
      stroke: 'rgba(255,255,255,0.5)', 'stroke-width': '3', 'stroke-dasharray': '6 4', 'stroke-opacity': '1'
    });
    group.appendChild(line);

    const label = svgEl('text', {
      x: dim.plotLeft + 6, y: equatorY - 6,
      fill: 'rgba(255,255,255,0.5)', 'font-size': '11', 'font-family': 'inherit', 'text-anchor': 'start', 'font-weight': '700', opacity: '0.8'
    });
    label.textContent = '$0';
    group.appendChild(label);
  }
  return equatorY;
}

function valToY(val, minVal, maxVal, dim) {
  const range = maxVal - minVal;
  if (range === 0) return dim.plotBottom;
  return dim.plotBottom - ((val - minVal) / range) * dim.plotHeight;
}

function monthToX(monthIdx, totalMonths, dim) {
  return dim.plotLeft + (monthIdx / Math.max(totalMonths - 1, 1)) * dim.plotWidth;
}

function drawReservoir(group, dim, flow, minVal, maxVal, currency) {
  if (flow.length < 2) return;

  let pathD = 'M ' + monthToX(0, flow.length, dim) + ' ' + valToY(0, minVal, maxVal, dim);
  for (let i = 0; i < flow.length; i++) {
    const x = monthToX(i, flow.length, dim);
    const cashVal = Math.min(flow[i].cash, 0);
    const y = valToY(cashVal, minVal, maxVal, dim);
    pathD += ' L ' + x + ' ' + y;
  }
  const lastX = monthToX(flow.length - 1, flow.length, dim);
  const zeroY = valToY(0, minVal, maxVal, dim);
  pathD += ' L ' + lastX + ' ' + zeroY + ' Z';

  const negPath = svgEl('path', {
    d: pathD, fill: 'url(#grad-reservoir)', 'stroke-opacity': '0'
  });
  group.appendChild(negPath);

  let posPathD = 'M ' + monthToX(0, flow.length, dim) + ' ' + valToY(0, minVal, maxVal, dim);
  for (let i = 0; i < flow.length; i++) {
    const x = monthToX(i, flow.length, dim);
    const cashVal = Math.max(flow[i].cash, 0);
    const y = valToY(cashVal, minVal, maxVal, dim);
    posPathD += ' L ' + x + ' ' + y;
  }
  posPathD += ' L ' + lastX + ' ' + zeroY + ' Z';

  const posArea = svgEl('path', {
    d: posPathD, fill: 'url(#grad-reservoir)', 'stroke-opacity': '0'
  });
  group.appendChild(posArea);

  let lineD = 'M';
  for (let i = 0; i < flow.length; i++) {
    const x = monthToX(i, flow.length, dim);
    const y = valToY(flow[i].cash, minVal, maxVal, dim);
    lineD += (i === 0 ? ' ' : ' L ') + x + ' ' + y;
  }

  const outline = svgEl('path', {
    d: lineD, fill: 'none', stroke: COLORS.reservoirBot, 'stroke-width': '2', 'stroke-opacity': '0.8',
    filter: 'url(#glow-cyan)'
  });
  group.appendChild(outline);

  for (let i = 0; i < flow.length; i++) {
    const x = monthToX(i, flow.length, dim);
    const y = valToY(flow[i].cash, minVal, maxVal, dim);
    const dot = svgEl('circle', {
      cx: x, cy: y, r: '3',
      fill: flow[i].cash >= 0 ? COLORS.reservoirBot : COLORS.crimson,
      stroke: flow[i].cash >= 0 ? COLORS.blue : COLORS.cliff,
      'stroke-width': '1', opacity: '0.8', 'data-month': i, class: 'cash-dot'
    });
    group.appendChild(dot);
  }
}

function drawRevenueGhosts(group, dim, flow, minVal, maxVal) {
  if (flow.length === 0) return;

  for (let i = 0; i < flow.length; i++) {
    const detail = flow[i].revenueDetail;
    if (!detail || detail.length === 0) continue;

    const x = monthToX(i, flow.length, dim);
    const barWidth = Math.max(dim.plotWidth / flow.length * 0.6, 8);

    let yOffset = 0;
    for (const rev of detail) {
      /* Scale ghost height relative to the max flow, guaranteeing minimum visibility.
         The stratosphere zone gets ~20% of plotHeight for the tallest flow. */
      const flowZoneHeight = dim.plotHeight * 0.18;
      const maxFlow = Math.max(maxSingleFlow, 1);
      const heightPx = Math.max((rev.amount / maxFlow) * flowZoneHeight, 12);
      const baseY = valToY(0, minVal, maxVal, dim);
      const ghostY = baseY - heightPx - yOffset;

      const rect = svgEl('rect', {
        x: x - barWidth / 2, y: ghostY, width: barWidth, height: heightPx,
        fill: 'url(#hatch-cyan)', stroke: COLORS.cyan, 'stroke-width': '1.5',
        'stroke-opacity': '0.6', rx: '2', ry: '2', class: 'revenue-ghost',
        'data-name': rev.name, 'data-amount': rev.amount, 'data-month': i,
        'data-terms': rev.terms || 'immediate'
      });
      group.appendChild(rect);

      const delay = getPaymentDelay(rev.terms);
      if (delay > 0 && i + delay < flow.length) {
        const targetX = monthToX(i + delay, flow.length, dim);
        const arrow = svgEl('line', {
          x1: x + barWidth / 2 + 2, y1: ghostY + heightPx / 2,
          x2: targetX - barWidth / 2 - 2, y2: ghostY + heightPx / 2,
          stroke: COLORS.cyan, 'stroke-width': '1', 'stroke-dasharray': '3 2', 'stroke-opacity': '0.25'
        });
        group.appendChild(arrow);
      }

      yOffset += heightPx + 2;
    }
  }
}

function drawOpexDrains(group, dim, flow, minVal, maxVal) {
  if (flow.length < 2) return;

  const zeroY = valToY(0, minVal, maxVal, dim);

  for (let i = 0; i < flow.length; i++) {
    if (flow[i].opexTotal <= 0) continue;

    const x = monthToX(i, flow.length, dim);
    const barWidth = Math.max(dim.plotWidth / flow.length * 0.3, 4);
    /* Scale OPEX bars relative to max flow, using the furnace zone below equator */
    const furnaceZone = dim.plotHeight * 0.12;
    const maxFlow = Math.max(maxSingleFlow, 1);
    const heightPx = Math.max((flow[i].opexTotal / maxFlow) * furnaceZone, 6);

    const pipe = svgEl('rect', {
      x: x - barWidth / 2, y: zeroY, width: barWidth, height: heightPx,
      fill: 'url(#grad-furnace)', stroke: COLORS.crimson, 'stroke-width': '1',
      'stroke-opacity': '0.5', rx: '1', ry: '1', class: 'opex-pipe',
      'data-month': i, 'data-amount': flow[i].opexTotal
    });

    pipe.innerHTML = '<animate attributeName="stroke-dasharray" values="0 4 4 0;4 0 0 4;0 4 4 0" dur="2s" repeatCount="indefinite"/>';
    group.appendChild(pipe);
  }
}

function drawCogsBars(group, dim, flow, minVal, maxVal) {
  for (let i = 0; i < flow.length; i++) {
    if (flow[i].cogsTotal <= 0) continue;

    const x = monthToX(i, flow.length, dim);
    const barWidth = Math.max(dim.plotWidth / flow.length * 0.2, 3);
    const furnaceZone = dim.plotHeight * 0.12;
    const maxFlow = Math.max(maxSingleFlow, 1);
    const heightPx = Math.max((flow[i].cogsTotal / maxFlow) * furnaceZone, 4);
    const zeroY = valToY(0, minVal, maxVal, dim);

    const bar = svgEl('rect', {
      x: x - barWidth / 2 - dim.plotWidth / flow.length * 0.2, y: zeroY,
      width: barWidth, height: heightPx,
      fill: COLORS.amber, 'fill-opacity': '0.3', stroke: COLORS.amber,
      'stroke-width': '1', 'stroke-opacity': '0.5', rx: '1', class: 'cogs-bar',
      'data-month': i, 'data-amount': flow[i].cogsTotal, 'data-name': 'COGS'
    });
    group.appendChild(bar);
  }
}

function drawTaxBars(group, dim, flow, minVal, maxVal) {
  for (let i = 0; i < flow.length; i++) {
    if (flow[i].taxTotal <= 0) continue;

    const x = monthToX(i, flow.length, dim);
    const barWidth = Math.max(dim.plotWidth / flow.length * 0.2, 3);
    const furnaceZone = dim.plotHeight * 0.12;
    const maxFlow = Math.max(maxSingleFlow, 1);
    const heightPx = Math.max((flow[i].taxTotal / maxFlow) * furnaceZone, 4);
    const zeroY = valToY(0, minVal, maxVal, dim);

    const bar = svgEl('rect', {
      x: x - barWidth / 2 + dim.plotWidth / flow.length * 0.2, y: zeroY,
      width: barWidth, height: heightPx,
      fill: COLORS.slate, 'fill-opacity': '0.4', stroke: COLORS.slate,
      'stroke-width': '1', 'stroke-opacity': '0.5', rx: '1', class: 'tax-bar',
      'data-month': i, 'data-amount': flow[i].taxTotal, 'data-name': 'Taxes'
    });
    group.appendChild(bar);
  }
}

function drawCapexMarkers(group, dim, flow, minVal, maxVal) {
  for (let i = 0; i < flow.length; i++) {
    if (flow[i].capexTotal <= 0) continue;

    const x = monthToX(i, flow.length, dim);
    const zeroY = valToY(0, minVal, maxVal, dim);
    const maxFlow = Math.max(maxSingleFlow, 1);
    const size = Math.max(Math.min((flow[i].capexTotal / maxFlow) * dim.plotHeight * 0.1, 24), 10);

    const diamond = svgEl('polygon', {
      points: [x, zeroY + 4, x + size / 2, zeroY + 4 + size / 2, x, zeroY + 4 + size, x - size / 2, zeroY + 4 + size / 2].join(','),
      fill: COLORS.violet, 'fill-opacity': '0.4', stroke: COLORS.violet,
      'stroke-width': '1.5', 'stroke-opacity': '0.7', class: 'capex-marker',
      'data-month': i, 'data-amount': flow[i].capexTotal
    });
    group.appendChild(diamond);

    for (const cap of flow[i].capexDetail) {
      const label = svgEl('text', {
        x: x, y: zeroY + 4 + size + 12,
        fill: COLORS.violet, 'font-size': '9', 'font-family': 'inherit',
        'text-anchor': 'middle', opacity: '0.6'
      });
      label.textContent = cap.name;
      group.appendChild(label);
    }
  }
}

function drawCliff(group, dim, flow, minVal, maxVal) {
  const cliffMonth = findRunway(flow);
  if (cliffMonth >= flow.length) return;

  const cliffX = monthToX(cliffMonth, flow.length, dim);

  const voidRect = svgEl('rect', {
    x: cliffX, y: dim.plotTop, width: dim.plotRight - cliffX, height: dim.plotHeight,
    fill: '#000000', 'fill-opacity': '0.7'
  });
  group.appendChild(voidRect);

  const cliffLine = svgEl('line', {
    x1: cliffX, y1: dim.plotTop, x2: cliffX, y2: dim.plotBottom,
    stroke: COLORS.cliff, 'stroke-width': '3', 'stroke-opacity': '0.9'
  });
  group.appendChild(cliffLine);

  const failText = svgEl('text', {
    x: (cliffX + dim.plotRight) / 2, y: (dim.plotTop + dim.plotBottom) / 2,
    fill: COLORS.cliff, 'font-size': '14', 'font-family': 'inherit',
    'text-anchor': 'middle', 'font-weight': '700', 'letter-spacing': '4'
  });
  failText.textContent = '>>>>> SYSTEM FAILURE';
  group.appendChild(failText);

  const zeroLabel = svgEl('text', {
    x: cliffX + 8, y: dim.plotTop + 20,
    fill: COLORS.cliff, 'font-size': '10', 'font-family': 'inherit', opacity: '0.8'
  });
  zeroLabel.textContent = getMonthLabel(flow[cliffMonth].month, currentData.timeline.startDate);
  group.appendChild(zeroLabel);
}

function drawCorridor(group, dim, minVal, maxVal) {
  if (!showCorridor) return;

  const optimistic = cashFlows['optimistic'];
  const pessimistic = cashFlows['pessimistic'];
  if (!optimistic || !pessimistic) return;

  const len = Math.min(optimistic.length, pessimistic.length);
  if (len < 2) return;

  let pathD = 'M ' + monthToX(0, len, dim) + ' ' + valToY(optimistic[0].cash, minVal, maxVal, dim);
  for (let i = 1; i < len; i++) {
    pathD += ' L ' + monthToX(i, len, dim) + ' ' + valToY(optimistic[i].cash, minVal, maxVal, dim);
  }
  for (let i = len - 1; i >= 0; i--) {
    pathD += ' L ' + monthToX(i, len, dim) + ' ' + valToY(pessimistic[i].cash, minVal, maxVal, dim);
  }
  pathD += ' Z';

  const corridor = svgEl('path', {
    d: pathD, fill: 'url(#grad-corridor)', stroke: COLORS.corridorStroke,
    'stroke-width': '1', 'stroke-dasharray': '4 3'
  });
  group.appendChild(corridor);
}

function drawPlayhead(group, dim, flow, minVal, maxVal) {
  if (playheadMonth < 0 || playheadMonth >= flow.length) return;

  const x = monthToX(playheadMonth, flow.length, dim);
  const line = svgEl('line', {
    x1: x, y1: dim.plotTop, x2: x, y2: dim.plotBottom,
    stroke: COLORS.text, 'stroke-width': '1', 'stroke-opacity': '0.5',
    'stroke-dasharray': '3 3', class: 'playhead-line'
  });
  group.appendChild(line);

  const handle = svgEl('circle', {
    cx: x, cy: dim.plotTop - 8, r: '5',
    fill: COLORS.cyan, stroke: COLORS.bg, 'stroke-width': '2',
    class: 'playhead-handle', style: 'cursor:ew-resize'
  });
  group.appendChild(handle);
}

/* ── Render Full Chart ─────────────────────────────────────── */

function render(data) {
  currentData = data;
  cashFlows = computeAllScenarios(data);

  const flow = cashFlows[activeScenario];
  if (!flow || flow.length === 0) return;

  summaryEl.textContent = (data.meta.companyName || 'Ledger') + ' — ' + (data.meta.summary || '');
  renderScenarioButtons(data.scenarios || []);

  const dim = getChartDimensions();
  clearSVG();
  svg.setAttribute('viewBox', '0 0 ' + dim.width + ' ' + dim.height);

  let allCashValues = [];
  let maxRevenue = 0;
  let maxOutflow = 0;
  maxSingleFlow = 0;
  for (const [, f] of Object.entries(cashFlows)) {
    for (const m of f) {
      allCashValues.push(m.cash);
      maxRevenue = Math.max(maxRevenue, m.grossRevenue);
      maxOutflow = Math.max(maxOutflow, m.totalOutflow);
      maxSingleFlow = Math.max(maxSingleFlow, m.grossRevenue, m.totalOutflow);
      for (const r of (m.revenueDetail || [])) maxSingleFlow = Math.max(maxSingleFlow, r.amount);
    }
  }

  const maxCash = Math.max(...allCashValues);
  const minCash = Math.min(...allCashValues);
  /* Reserve vertical space for flow bars: at least 20% of chart for revenue above
     equator and 15% for outflows below, so they're always visible */
  const flowHeadroom = Math.max(maxRevenue, maxOutflow, maxCash * 0.15);
  const maxVal = Math.max(maxCash, 0) + flowHeadroom * 1.2;
  const minVal = Math.min(minCash, 0) - flowHeadroom * 0.8;

  svg.appendChild(buildDefs(dim));

  const gridGroup = svgEl('g', { class: 'grid-layer' });
  drawGrid(gridGroup, dim, maxVal, minVal);
  svg.appendChild(gridGroup);

  const equatorGroup = svgEl('g', { class: 'equator-layer' });
  drawEquator(equatorGroup, dim, minVal, maxVal);
  svg.appendChild(equatorGroup);

  const corridorGroup = svgEl('g', { class: 'corridor-layer' });
  drawCorridor(corridorGroup, dim, minVal, maxVal);
  svg.appendChild(corridorGroup);

  const reservoirGroup = svgEl('g', { class: 'reservoir-layer' });
  drawReservoir(reservoirGroup, dim, flow, minVal, maxVal);
  svg.appendChild(reservoirGroup);

  const ghostGroup = svgEl('g', { class: 'ghost-layer' });
  drawRevenueGhosts(ghostGroup, dim, flow, minVal, maxVal);
  svg.appendChild(ghostGroup);

  const opexGroup = svgEl('g', { class: 'opex-layer' });
  drawOpexDrains(opexGroup, dim, flow, minVal, maxVal);
  svg.appendChild(opexGroup);

  const cogsGroup = svgEl('g', { class: 'cogs-layer' });
  drawCogsBars(cogsGroup, dim, flow, minVal, maxVal);
  svg.appendChild(cogsGroup);

  const taxGroup = svgEl('g', { class: 'tax-layer' });
  drawTaxBars(taxGroup, dim, flow, minVal, maxVal);
  svg.appendChild(taxGroup);

  const capexGroup = svgEl('g', { class: 'capex-layer' });
  drawCapexMarkers(capexGroup, dim, flow, minVal, maxVal);
  svg.appendChild(capexGroup);

  const cliffGroup = svgEl('g', { class: 'cliff-layer' });
  drawCliff(cliffGroup, dim, flow, minVal, maxVal);
  svg.appendChild(cliffGroup);

  const playheadGroup = svgEl('g', { class: 'playhead-layer' });
  drawPlayhead(playheadGroup, dim, flow, minVal, maxVal);
  svg.appendChild(playheadGroup);

  const interactGroup = svgEl('g', { class: 'interact-layer' });
  drawInteractionZone(interactGroup, dim, flow, minVal, maxVal);
  svg.appendChild(interactGroup);

  updateHUD(flow, data);
  updateLegend();
  loadingEl.classList.add('hidden');
}

/* ── Interaction Zone (invisible rects for mouse events) ───── */

function drawInteractionZone(group, dim, flow, minVal, maxVal) {
  const colWidth = dim.plotWidth / flow.length;
  for (let i = 0; i < flow.length; i++) {
    const x = dim.plotLeft + i * colWidth;
    const rect = svgEl('rect', {
      x: x, y: dim.plotTop, width: colWidth, height: dim.plotHeight,
      fill: 'transparent', class: 'interact-col', 'data-month': i,
      style: 'cursor:crosshair'
    });
    group.appendChild(rect);
  }
}

/* ── HUD ───────────────────────────────────────────────────── */

function updateHUD(flow, data) {
  const runway = findRunway(flow);
  const burn = findBurnRate(flow);
  const currentCash = flow[0].cash;
  const currency = data.financials.currency || 'USD';
  const totalMonths = flow.length;

  let runwayMonths;
  if (runway >= totalMonths) {
    runwayMonths = burn > 0 ? (currentCash / burn) : Infinity;
  } else {
    runwayMonths = runway;
  }

  let runwayColor = 'cobalt';
  let runwayClass = 'cobalt';
  let barColor = COLORS.cobalt;
  if (runwayMonths < 3) { runwayColor = COLORS.hazard; runwayClass = 'hazard-val'; barColor = COLORS.hazard; }
  else if (runwayMonths < 6) { runwayColor = COLORS.crimson; runwayClass = 'crimson-val'; barColor = COLORS.crimson; }
  else if (runwayMonths < 12) { runwayColor = COLORS.amber; runwayClass = 'amber-val'; barColor = COLORS.amber; }
  else if (runwayMonths < 18) { runwayColor = COLORS.blue; runwayClass = 'blue'; barColor = COLORS.blue; }

  let zeroDateStr = 'Beyond forecast';
  if (runway < totalMonths) {
    zeroDateStr = getMonthLabel(flow[runway].month, data.timeline.startDate);
  }

  const barPct = Math.min(runwayMonths / totalMonths * 100, 100);

  const runwayStr = runwayMonths === Infinity ? '\u221e' : runwayMonths.toFixed(1) + 'mo';
  const burnStr = burn > 0 ? formatCurrency(burn, currency) + '/mo' : 'Net +';

  hudEl.innerHTML = '<div class="hud-title">RUNWAY</div>' +
    '<div class="hud-row"><span class="hud-label">RWY</span><span class="hud-value ' + runwayClass + '">' + runwayStr + '</span></div>' +
    '<div class="hud-row"><span class="hud-label">Cash</span><span class="hud-value">' + formatCurrency(currentCash, currency) + '</span></div>' +
    '<div class="hud-row"><span class="hud-label">Burn</span><span class="hud-value">' + burnStr + '</span></div>' +
    '<div class="hud-row"><span class="hud-label">\u2300</span><span class="hud-value">' + zeroDateStr + '</span></div>' +
    '<div id="runway-bar"><div id="runway-bar-fill" style="width:' + barPct + '%;background:' + barColor + '"></div></div>';
}

function updateLegend() {
  legendEl.innerHTML =
    '<div class="legend-item"><div class="legend-swatch" style="background:' + COLORS.cyan + ';opacity:0.5"></div>Revenue (Ghosts)</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:' + COLORS.reservoirBot + '"></div>Cash Reservoir</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:' + COLORS.crimson + '"></div>OPEX Furnace</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:' + COLORS.amber + '"></div>COGS</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:' + COLORS.slate + '"></div>Taxes</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:' + COLORS.violet + '"></div>CAPEX</div>';
}

/* ── Scenario Buttons ──────────────────────────────────────── */

function renderScenarioButtons(scenarios) {
  scenarioButtons.innerHTML = '';
  for (const s of scenarios) {
    const btn = document.createElement('button');
    btn.className = 'scenario-btn' + (s.id === activeScenario ? ' active' : '');
    btn.textContent = s.name;
    btn.dataset.scenarioId = s.id;
    btn.addEventListener('click', () => switchScenario(s.id));
    scenarioButtons.appendChild(btn);
  }
}

function switchScenario(scenarioId) {
  if (scenarioId === activeScenario) return;
  activeScenario = scenarioId;
  if (currentData) render(currentData);
}

/* ── Tooltip System ────────────────────────────────────────── */

function showTooltip(x, y, name, amount, pct, extra) {
  const currency = currentData ? (currentData.financials.currency || 'USD') : 'USD';
  let html = '<div class="tt-name">' + escapeHtml(name) + '</div>';
  html += '<div class="tt-amount">' + formatCurrencyFull(amount, currency) + '</div>';
  if (pct !== null && pct !== undefined) {
    html += '<div class="tt-pct">' + pct.toFixed(1) + '% of total</div>';
  }
  if (extra) {
    html += '<div class="tt-pct" style="margin-top:4px">' + escapeHtml(extra) + '</div>';
  }
  tooltipEl.innerHTML = html;

  const wrapRect = canvasWrap.getBoundingClientRect();
  let tx = x - wrapRect.left + 14;
  let ty = y - wrapRect.top - 10;
  if (tx + 200 > wrapRect.width) tx = x - wrapRect.left - 200;
  if (ty < 0) ty = 10;

  tooltipEl.style.left = tx + 'px';
  tooltipEl.style.top = ty + 'px';
  tooltipEl.classList.add('visible');
}

function hideTooltip() {
  tooltipEl.classList.remove('visible');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ── Playhead Info ─────────────────────────────────────────── */

function updatePlayheadInfo(monthIdx) {
  const flow = cashFlows[activeScenario];
  if (!flow || monthIdx < 0 || monthIdx >= flow.length) {
    playheadInfoEl.classList.remove('visible');
    return;
  }

  const m = flow[monthIdx];
  const currency = currentData.financials.currency || 'USD';
  const label = getMonthLabel(m.month, currentData.timeline.startDate);

  playheadInfoEl.innerHTML =
    '<strong>' + label + '</strong> &nbsp;|&nbsp; ' +
    'Cash: <span style="color:' + (m.cash >= 0 ? COLORS.blue : COLORS.cliff) + '">' + formatCurrencyFull(m.cash, currency) + '</span>' +
    ' &nbsp;|&nbsp; In: <span style="color:' + COLORS.cyan + '">' + formatCurrencyFull(m.cashInflow, currency) + '</span>' +
    ' &nbsp;|&nbsp; Out: <span style="color:' + COLORS.crimson + '">' + formatCurrencyFull(m.totalOutflow, currency) + '</span>' +
    ' &nbsp;|&nbsp; Net: <span style="color:' + (m.netCashFlow >= 0 ? COLORS.emerald : COLORS.crimson) + '">' +
    formatCurrencyFull(m.netCashFlow, currency) + '</span>';
  playheadInfoEl.classList.add('visible');
}

/* ── OPEX Detail Panel ─────────────────────────────────────── */

function showOpexDetail(monthIdx) {
  const flow = cashFlows[activeScenario];
  if (!flow || monthIdx < 0 || monthIdx >= flow.length) return;

  const m = flow[monthIdx];
  if (!m.opexDetail || m.opexDetail.length === 0) {
    opexDetailEl.classList.remove('visible');
    return;
  }

  const currency = currentData.financials.currency || 'USD';
  const label = getMonthLabel(m.month, currentData.timeline.startDate);
  let html = '<span class="od-close" id="opex-close">&times;</span>';
  html += '<div class="od-title">OPEX — ' + label + '</div>';

  const categories = {};
  for (const item of m.opexDetail) {
    const cat = item.category || 'other';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(item);
  }

  for (const [cat, items] of Object.entries(categories)) {
    html += '<div style="color:' + COLORS.crimson + ';font-size:10px;margin-top:6px;text-transform:uppercase;letter-spacing:1px">' + cat + '</div>';
    for (const item of items) {
      html += '<div class="od-row"><span class="od-name">' + escapeHtml(item.name) +
        '</span><span class="od-val">' + formatCurrencyFull(item.amount, currency) + '</span></div>';
    }
  }
  html += '<div class="od-row" style="margin-top:6px;border-top:1px solid ' + COLORS.crimson + ';padding-top:4px"><span class="od-name" style="color:' + COLORS.text + '">Total</span><span class="od-val" style="color:' + COLORS.crimson + '">' + formatCurrencyFull(m.opexTotal, currency) + '</span></div>';

  opexDetailEl.innerHTML = html;
  opexDetailEl.classList.add('visible');
  opexExpanded = true;

  document.getElementById('opex-close').addEventListener('click', () => {
    opexDetailEl.classList.remove('visible');
    opexExpanded = false;
  });
}

/* ══════════════════════════════════════════════════════════════
   EVENT HANDLERS
   ══════════════════════════════════════════════════════════════ */

canvasWrap.addEventListener('mousemove', (e) => {
  const target = e.target;

  if (target.classList.contains('interact-col')) {
    const monthIdx = parseInt(target.dataset.month);
    playheadMonth = monthIdx;
    updatePlayheadInfo(monthIdx);

    if (currentData) {
      render(currentData);
    }
  }

  if (target.classList.contains('revenue-ghost')) {
    const name = target.dataset.name;
    const amount = parseFloat(target.dataset.amount);
    const terms = target.dataset.terms;
    const flow = cashFlows[activeScenario];
    const monthIdx = parseInt(target.dataset.month);
    const totalRev = flow && flow[monthIdx] ? flow[monthIdx].grossRevenue : 1;
    showTooltip(e.clientX, e.clientY, name, amount, (amount / totalRev) * 100, 'Terms: ' + terms);
    return;
  }

  if (target.classList.contains('opex-pipe')) {
    const amount = parseFloat(target.dataset.amount);
    const monthIdx = parseInt(target.dataset.month);
    const flow = cashFlows[activeScenario];
    const totalOut = flow && flow[monthIdx] ? flow[monthIdx].totalOutflow : 1;
    showTooltip(e.clientX, e.clientY, 'Operating Expenses', amount, (amount / totalOut) * 100, 'Click for breakdown');
    return;
  }

  if (target.classList.contains('cogs-bar')) {
    const amount = parseFloat(target.dataset.amount);
    const flow = cashFlows[activeScenario];
    const monthIdx = parseInt(target.dataset.month);
    const totalOut = flow && flow[monthIdx] ? flow[monthIdx].totalOutflow : 1;
    showTooltip(e.clientX, e.clientY, 'Cost of Goods', amount, (amount / totalOut) * 100);
    return;
  }

  if (target.classList.contains('tax-bar')) {
    const amount = parseFloat(target.dataset.amount);
    const flow = cashFlows[activeScenario];
    const monthIdx = parseInt(target.dataset.month);
    const totalOut = flow && flow[monthIdx] ? flow[monthIdx].totalOutflow : 1;
    showTooltip(e.clientX, e.clientY, 'Taxes', amount, (amount / totalOut) * 100, 'Quarterly assessment');
    return;
  }

  if (target.classList.contains('capex-marker')) {
    const amount = parseFloat(target.dataset.amount);
    const flow = cashFlows[activeScenario];
    const monthIdx = parseInt(target.dataset.month);
    const detail = flow[monthIdx].capexDetail;
    const names = detail.map(c => c.name).join(', ');
    showTooltip(e.clientX, e.clientY, 'Capital Expenditure', amount, null, names);
    return;
  }

  if (target.classList.contains('cash-dot')) {
    const monthIdx = parseInt(target.dataset.month);
    const flow = cashFlows[activeScenario];
    if (flow && flow[monthIdx]) {
      const currency = currentData.financials.currency || 'USD';
      showTooltip(e.clientX, e.clientY, 'Cash Balance', flow[monthIdx].cash, null,
        getMonthLabel(flow[monthIdx].month, currentData.timeline.startDate));
    }
    return;
  }

  if (!target.classList.contains('interact-col')) {
    hideTooltip();
  }
});

canvasWrap.addEventListener('mouseleave', () => {
  hideTooltip();
  playheadMonth = -1;
  playheadInfoEl.classList.remove('visible');
  if (currentData) render(currentData);
});

canvasWrap.addEventListener('click', (e) => {
  const target = e.target;
  if (target.classList.contains('opex-pipe') || target.classList.contains('interact-col')) {
    const monthIdx = parseInt(target.dataset.month);
    showOpexDetail(monthIdx);
  }
});

corridorCb.addEventListener('change', () => {
  showCorridor = corridorCb.checked;
  if (currentData) render(currentData);
});

/* ── Resize Handler ────────────────────────────────────────── */
let resizeTimeout = null;
window.addEventListener('resize', () => {
  if (resizeTimeout) clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (currentData) render(currentData);
  }, 150);
});

/* ══════════════════════════════════════════════════════════════
   DATA POLLING
   ══════════════════════════════════════════════════════════════ */

function validateData(data) {
  if (!data || typeof data !== 'object') return false;
  if (!data.financials) return false;
  if (typeof data.financials.starting_cash !== 'number') return false;
  if (!data.timeline || typeof data.timeline.months !== 'number') return false;
  if (!Array.isArray(data.scenarios)) data.scenarios = [{ id: 'base', name: 'Base', adjustments: [] }];
  if (!data.meta) data.meta = { companyName: 'Ledger', summary: '' };
  if (!data.financials.revenue_streams) data.financials.revenue_streams = [];
  if (!data.financials.operating_expenses) data.financials.operating_expenses = [];
  if (!data.financials.cost_of_goods) data.financials.cost_of_goods = [];
  if (!data.financials.capital_expenditure) data.financials.capital_expenditure = [];
  if (!data.financials.taxes) data.financials.taxes = { effectiveRate: 0, frequency: 'quarterly', method: 'percentage-of-profit' };
  if (!data.config) data.config = {};
  return true;
}

setInterval(async () => {
  try {
    const res = await fetch('/data.json?t=' + Date.now());
    if (!res.ok) return;
    const text = await res.text();
    if (text === lastDataHash) return;
    lastDataHash = text;
    const data = JSON.parse(text);
    if (!validateData(data)) return;

    if (data.config.defaultScenario && !currentData) {
      activeScenario = data.config.defaultScenario;
    }

    render(data);
  } catch (e) {
    /* Silently retry on next poll */
  }
}, POLL_INTERVAL);

})();
</script>
